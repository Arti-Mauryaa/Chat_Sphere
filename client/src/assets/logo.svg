<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Custom Theme-Matching Gradients -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c52ff" />
      <stop offset="100%" stop-color="#ff7b89" />
    </linearGradient>
    <linearGradient id="secondaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00c6ff" />
      <stop offset="100%" stop-color="#0072ff" />
    </linearGradient>
    
    <!-- Ultra-premium Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Ambient outer orbit ring -->
  <circle cx="50" cy="50" r="38" fill="none" stroke="url(#primaryGrad)" stroke-width="3" opacity="0.25" filter="url(#glow)" />
  
  <!-- Outer latitude rings representing the 'Sphere' of connections -->
  <path d="M22,35 C35,20 65,20 78,35" fill="none" stroke="url(#primaryGrad)" stroke-width="2.5" stroke-linecap="round" opacity="0.8" filter="url(#glow)" />
  <path d="M22,65 C35,80 65,80 78,65" fill="none" stroke="url(#secondaryGrad)" stroke-width="2.5" stroke-linecap="round" opacity="0.8" filter="url(#glow)" />
  
  <!-- Futuristic Glassmorphic Chat core -->
  <g filter="url(#glow)">
    <!-- Base bubble layer in cool cyan gradient -->
    <path d="M36,46 C36,39 42.5,33.5 50,33.5 C57.5,33.5 64,39 64,46 C64,51 60.5,55.5 55,57 L56.5,63.5 L49.5,58.5 C42.5,58.5 36,53 36,46 Z" 
          fill="url(#secondaryGrad)" opacity="0.8" />
    
    <!-- Intersecting foreground bubble layer in warm violet gradient -->
    <path d="M41,50 C41,44.5 47,40 53.5,40 C60,40 65,44.5 65,50 C65,54 62,57.5 57.5,58.5 L58.5,64 L53,60 C47,60 41,55.5 41,50 Z" 
          fill="url(#primaryGrad)" opacity="0.85" style="mix-blend-mode: screen;" />
          
    <!-- Core white highlight dot representing active connection -->
    <circle cx="50" cy="46" r="2.5" fill="#ffffff" filter="url(#glow)" opacity="0.95" />
  </g>
</svg>
